// EDuke32 Configuration for PlayStation Classic Mini
// DNF (Duke Nukem Forever Mod) - Optimized for PSC hardware
// ARM Cortex-A35 @ 1.5GHz, 1GB RAM, 720p HDMI output

// ---------- Video Settings ----------
// PS Classic outputs 720p over HDMI, use a compatible resolution
ScreenWidth = 640
ScreenHeight = 480
ScreenBPP = 8
MaxRefreshFreq = 60
FullScreen = 1
// Force classic software renderer (no OpenGL on PSC)
UseHighTile = 0
UseModels = 0
r_usenewaspect = 1
r_fpgrouscan = 0

// ---------- Audio Settings ----------
MixRate = 22050
NumVoices = 16
NumChannels = 2
NumBits = 16
MusicVolume = 200
SoundVolume = 220
AmbienceToggle = 1
MusicToggle = 1
FXToggle = 1

// ---------- Input / Controller ----------
// PS Classic controller mapping
// The PS Classic uses a USB controller that maps as standard gamepad
//
// PSC Controller -> Duke3D action mapping:
// D-pad         -> Movement (forward/back/strafe)
// Cross (X)     -> Open/Use
// Circle (O)    -> Jump
// Square        -> Fire
// Triangle      -> Map
// L1            -> Previous weapon
// R1            -> Next weapon
// L2            -> Crouch
// R2            -> Open/Use (alt)
// Start         -> Pause menu
// Select        -> Map/Inventory

UseJoystick = 1
ControllerType = 2
RunKeyBehaviour = 0

// Controller axes
JoystickAnalogAxes0 = 0
JoystickAnalogAxes1 = 1

// Enable auto-aim (easier with controller)
AutoAim = 1

// ---------- Game Settings ----------
// Difficulty default
Skill = 1
// Last accessed episode
Episode = 0
// Screen size (0 = full, higher = more HUD border)
ScreenSize = 4
// Status bar/overhead map
ShowOpponentWeapons = 0
// Crosshair
CrosshairToggle = 1

// ---------- Performance ----------
// Optimized for PSC's limited CPU
// Limit visible sprites
r_maxfps = 30
r_ambientlight = 1.0
r_pr_maxlightpasses = 1

// Cache settings for 1GB RAM
// Keep caches reasonable
cachesize = 32768
